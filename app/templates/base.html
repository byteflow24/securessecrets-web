<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/images/icon.ico') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VV6NCJ0407"></script>

    <!-- Font Awesome icons (free version) -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" defer crossorigin="anonymous"></script>

    <!-- Smart App Banner -->
    <meta name="apple-itunes-app" content="app-id=6748462172">

    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700|Open+Sans:300,400,600,700,800" rel="stylesheet">

    <!-- Core theme CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSRF Token -->
    <meta name="csrf-token" content="{{ csrf_token() }}">

    <meta name="description"
        content="SecuresSecrets lets you store private messages or a last will, set a timer, and share securely with loved ones or publicly.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin-when-cross-origin">

    <!-- Title -->
    <meta name="page-title" content="{% block page_title %}Secures Secrets{% endblock %}">
    <title>{% block title %}Secures Secrets{% endblock %}</title>

    <!-- Core theme JS-->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

    <!-- jQuery Script -->
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" crossorigin="anonymous"></script>

    <!-- Google Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9464389592028949"
        crossorigin="anonymous"></script>

    {% block styles %}
    {% endblock %}

</head>

<body class="mx-auto" style="background: linear-gradient(to right, #141E30, #243B55); color: #020202;">
    <!-- App Banner -->
    <div id="appBanner" class="app-banner d-none">
        <div class="app-banner-content">
            <img src="{{ url_for('static', filename='images/logo.webp') }}" alt="SecuresSecrets"
                class="app-banner-logo">

            <div class="app-banner-text">
                <h6>Continue in SecuresSecrets</h6>
                <small>Enjoy the full experience in the mobile app.</small>
            </div>

            <a id="appBannerButton" href="#" class="btn btn-success btn-sm">
                Open
            </a>

            <button id="closeBanner" class="btn-close ms-2" aria-label="Close"></button>
        </div>
    </div>
    <div class="page-wrapper">
        <main>
            <div id="content">
                {% if show_header %}
                {% include "header.html" %}
                {% endif %}

                <div id="content-container" class="container mt-5">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
        {% if show_footer %}
        {% include "footer.html" %}
        {% endif %}
    </div>
</body>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const banner = document.getElementById("appBanner");
        const button = document.getElementById("appBannerButton");
        const close = document.getElementById("closeBanner");

        if (!banner || !button) return;

        // Don't show again if the user closed it
        if (localStorage.getItem("hideAppBanner") === "true") {
            return;
        }

        const ua = navigator.userAgent;

        const isIOS = /iPhone|iPad|iPod/i.test(ua);

        const isAndroid = /Android/i.test(ua);

        if (isIOS) {

            banner.classList.remove("d-none");

            button.innerText = "Open";

            button.href = "securessecrets://app/login";

        } else if (isAndroid) {

            banner.classList.remove("d-none");

            button.innerText = "Open";

            button.href = "securessecrets://app/login";

        } else {

            // Hide on desktop for now
            banner.classList.add("d-none");

        }

        close?.addEventListener("click", function () {

            banner.classList.add("d-none");

            localStorage.setItem(
                "hideAppBanner",
                "true"
            );

        });

        button.addEventListener("click", function (e) {

            e.preventDefault();

            const appLink = "securessecrets://app/login";

            const iosStore =
                "https://apps.apple.com/app/id6748462172";

            const androidStore =
                "https://play.google.com/store/apps/details?id=com.byteflowdigital.secures_secrets";

            const fallback = isIOS ? iosStore : androidStore;

            let opened = false;

            const visibilityHandler = () => {
                if (document.hidden) {
                    opened = true;
                }
            };

            document.addEventListener(
                "visibilitychange",
                visibilityHandler,
                { once: true }
            );

            if (isIOS) {
                window.location.href = appLink;
            } else if (isAndroid) {
                const iframe = document.createElement("iframe");
                iframe.style.display = "none";
                iframe.src = appLink;
                document.body.appendChild(iframe);

                setTimeout(() => iframe.remove(), 1000);
            }

            setTimeout(function () {

                if (!opened) {
                    window.location.href = fallback;
                }

            }, 1500);

        });

    });
</script>

</html>

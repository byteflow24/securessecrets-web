<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/images/icon.ico') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VV6NCJ0407"></script>

    <!-- Font Awesome icons (free version) -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" defer crossorigin="anonymous"></script>

    
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700|Open+Sans:300,400,600,700,800" rel="stylesheet">
    
    <!-- Core theme CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSRF Token -->
    <meta name="csrf-token" content="{{ csrf_token() }}">

    <!-- Title -->
    <meta name="page-title" content="{% block page_title %}Secures Secrets{% endblock %}">
    <title>{% block title %}Secures Secrets{% endblock %}</title>

    
    <!-- jQuery Script -->
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" crossorigin="anonymous"></script>

    <!-- Google Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9464389592028949" crossorigin="anonymous">
    </script>

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net https://code.jquery.com https://www.googletagmanager.com https://use.fontawesome.com https://cdnjs.cloudflare.com;
        style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com;
        font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com;
        img-src 'self' https://pagead2.googlesyndication.com;
        connect-src 'self' https://ep1.adtrafficquality.google;
        frame-src 'self' https://googleads.g.doubleclick.net;
    ">

    {% block styles %}
    {% endblock %}
    
</head>
<body class="mx-auto" style="background-image: url('../static/assets/images/bg.jpg'); background-size: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; height: 100%;">
    <div id="content">
        {% if show_header %}
            {% include "header.html" %}
        {% endif %}
        <div id="content-container" class="container mt-5">
            {% block content %}{% endblock %}
        </div>
    </div>
    {% if show_footer %}
        {% include "footer.html" %}
    {% endif %}
</body>
</html>

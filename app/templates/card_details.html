<!DOCTYPE html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Ensures optimal rendering on mobile devices. -->
   <style>
     /* Basic reset */
     body, html {
       margin: 0;
       padding: 0;
       height: 100%;
       font-family: Arial, sans-serif;
     }

     /* Center the content vertically and horizontally */
     body {
       display: flex;
       flex-direction: column;
       justify-content: center;
       align-items: center;
       text-align: center;
       height: 100vh;
       background-color: #f4f4f4;
       padding: 20px;
     }
     
     /* Styling the text above the PayPal button */
     .payment-message {
       font-size: 18px;  /* Medium size font */
       color: #333;
       margin-bottom: 25px;
       line-height: 1.5;
     }
     
     /* Center the PayPal button container and adjust spacing */
     #paypal-button-container {
       display: flex;
       justify-content: center;
       align-items: center;
       width: 30%;
     }

     /* Adjust PayPal button size */
     .paypal-button {
       width: 100px;
     }
   </style>
</head>
<body>
  <!-- Text message above the PayPal button -->
  <div class="payment-message">
    <p>Please enter your card details to complete the subscription. You will receive a 14-day free trial before any charges are made.</p>
  </div>

  <!-- PayPal button script -->
  <script src="https://www.paypal.com/sdk/js?client-id={{ client_id }}&vault=true&intent=subscription"></script>

  <!-- PayPal button container -->
  <div id="paypal-button-container"></div>

  <script>
    paypal.Buttons({
      createSubscription: function(data, actions) {
        return actions.subscription.create({
          'plan_id': '{{ paypal_plan_id }}'  // Dynamically passes the PayPal plan ID from Flask
        });
      },
      onApprove: function(data, actions) {
        // Log the entire response object to the console
        console.log('PayPal response:', data);

        // Handle the approval and pass the subscription details back to your backend
        const subscriptionID = data.subscriptionID;
        const responseData = data;

        // Send the subscription ID and user details to your Flask backend to process the data
        fetch('/process-subscription', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token() }}',  // CSRF protection if you're using Flask-WTF
          },
          body: JSON.stringify({
            subscription_id: subscriptionID,
            user_id: '{{ current_user.id }}',  // Pass the current user's ID
            paypal_response: responseData,  // Pass the entire PayPal response object
          })
        })
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success') {
            window.location.href = '/dashboard';  // Redirect to the home page after success
          } else {
            alert('Subscription failed. Please try again.');
          }
        })
        .catch(error => {
          console.error('Error:', error);
        });
      }
    }).render('#paypal-button-container');
  </script>
</body>
</html>

<!DOCTYPE html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100vh;
      background-color: #f4f4f4;
      padding: 20px;
    }
    .payment-message {
      font-size: 18px;
      color: #333;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    #payment-options {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 300px;
    }
    #paypal-button-container, #apple-pay-button, #google-pay-button {
      width: 100%;
      max-width: 200px;
    }
    #apple-pay-button {
      display: none;
      -webkit-appearance: -apple-pay-button;
      -apple-pay-button-type: subscribe;
      -apple-pay-button-style: black;
      height: 40px;
      border-radius: 8px;
    }
    #google-pay-button {
      display: none;
      height: 40px;
      border-radius: 8px;
    }
    #no-wallet-message {
      display: none;
      color: #666;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

  <div class="payment-message">
    {% if not current_user.next_billing_date %}
      <p>Please select a payment method to complete the subscription. You will receive a 14-day free trial.</p>
    {% else %}

    {% endif %}

    // Check if Apple Pay is available
    function isApplePayAvailable() {
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      const available = isSafari && window.ApplePaySession && ApplePaySession.canMakePayments();
      console.log('Is Safari:', isSafari, 'Apple Pay available:', available);
      return available;
    }

    // Initialize PayPal buttons
    paypal.Buttons({
      createSubscription: function(data, actions) {
        return actions.subscription.create({
          plan_id: '{{ paypal_plan_id }}'
        });
      },
      onApprove: function(data, actions) {
        console.log('PayPal response:', data);
        fetch('/process-subscription', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token() }}'
          },
          body: JSON.stringify({
            subscription_id: data.subscriptionID,
            user_id: '{{ current_user.id }}',
            paypal_response: data,
            payment_method: 'paypal'
          })
        })
        .then(response => response.json())
        .then(data => {
          alert(data.message);
          const isFlutterApp = window.location.search.includes('from=app') || navigator.userAgent.includes('Flutter');
          window.location.href = isFlutterApp ? 'myapp://subscription-success' : '/dashboard';
        })
        .catch(error => {
          console.error('PayPal fetch error:', error);
          alert('An error occurred with PayPal. Please try again.');
        });
      },
      onError: function(err) {
        console.error('PayPal button error:', err);
        alert('PayPal button failed to load. Please try again.');
      }
    }).render('#paypal-button-container').catch(err => {
      console.error('PayPal render error:', err);
    });

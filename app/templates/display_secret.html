<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Sign Up - Secure Secrets</title>
    {% block styles %}
    <!-- Font Awesome icons (free version) -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700|Open+Sans:300,400,600,700,800" rel="stylesheet">
    <!-- Core theme CSS (includes Bootstrap) -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    {% endblock %}
</head>
<body style="background: linear-gradient(to right, #141E30, #243B55); color: #fff;">
    <div class="d-flex align-items-center justify-content-center vh-100">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <!-- Centered Logo -->
            <div class="text-center mb-4">
                <a href="/" class="d-inline-flex align-items-center link-light text-decoration-none">
                    <i class="fas fa-shield-alt" style="font-size: 2rem;"></i>
                    <span class="ms-2 fs-4 fw-bold">Secures Secrets</span>
                </a>
            </div>
            <!-- Form Container -->
            <div class="bg-dark text-light p-5 rounded shadow-lg">
                <h2 class="text-center mb-4 fw-bold">{{ secret.title }}</h2>
                <p class="lead text-center">{{ decrypted_secret }}</p>
                {% if secret.file %}
                <p class="text-center"><a href="{{ url_for('main.download_file', filename=secret.file) }}" class="btn btn-outline-light">Download Attachment</a></p>
                {% endif %}
                <div class="text-center mt-4">
                    <a href="{{ url_for('main.register') }}" class="btn btn-primary btn-lg px-5 py-2">Join Us Now</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+pdGkiQlq2Xr2ZTci8I8KxL5pB25I" crossorigin="anonymous"></script>
</body>
</html>

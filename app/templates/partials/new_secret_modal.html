<!-- New Secret Modal -->
<div class="modal fade" id="newSecretModal" tabindex="-1" aria-labelledby="newSecretModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="newSecretModalLabel">Create a New Secret</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="formError" class="text-danger mb-3" style="display: none;"></div>
                {% include "partials/new_secret.html" %}
                <!-- Storage Info -->
                <div class="mb-3" style="font-size: 0.8rem;">
                    <label class="form-label" style="font-weight: bold; color: #2c3e50;">Storage Usage</label>
                    <div class="progress" style="height: 20px; width:30%; border-radius: 10px; overflow: hidden;">
                        <div
                            class="progress-bar 
                                {% if (current_user.storage_used / current_user.plan.storage_limit * 100) > 80 %}
                                    bg-danger
                                {% elif (current_user.storage_used / current_user.plan.storage_limit * 100) > 50 %}
                                    bg-warning
                                {% else %}
                                    bg-success
                                {% endif %}"
                            role="progressbar"
                            style="width: {{ (current_user.storage_used / current_user.plan.storage_limit * 100) | round(2) }}"
                            aria-valuenow="{{ (current_user.storage_used / current_user.plan.storage_limit * 100) | round(2) }}"
                            aria-valuemin="0"
                            aria-valuemax="100"
                        >
                            {{ (current_user.storage_used / current_user.plan.storage_limit * 100) | round(2) }}%
                        </div>
                    </div>
                    <small class="text-muted">
                        {{ (current_user.storage_used / (1024 * 1024)) | round(2) }} MB used out of {{ (current_user.plan.storage_limit / (1024 * 1024)) | round(2) }} MB
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

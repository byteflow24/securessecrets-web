<!doctype html>
<html lang="{{ session.get('lang', 'en') }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ gettext('Your Website Title') }}</title>
    <!-- Add your styles and scripts -->
</head>
<body>

<!-- Language Selection -->
<div class="language-selection">
    <ul>
        {% for code, language in LANGUAGES.items() %}
            <li><a href="{{ url_for('main.set_language', lang=code) }}">{{ language }}</a></li>
        {% endfor %}
    </ul>
</div>

<!-- Main Content -->
<div>
    <h1>{{ gettext('Hello World') }}</h1>
</div>

</body>
</html>
